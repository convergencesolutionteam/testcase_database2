name: Deploy MkDocs
on:
  push:
    branches:
      - main  # 소스가 올라오는 브랜치

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material  # mkdocs와 테마를 함께 설치

      - name: Deploy to GitHub Pages
        run: python -m mkdocs gh-pages --force
