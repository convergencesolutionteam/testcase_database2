name: Deploy MkDocs
on:
  push:
    branches:
      - main  # 또는 실제 소스 코드가 올라오는 브랜치 이름 (deploy라면 deploy로 수정)

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material  # 사용 중인 테마가 다르면 수정

      - name: Build MkDocs
        run: python -m mkdocs build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site  # MkDocs는 기본적으로 'site' 폴더에 빌드 결과물을 만듭니다.
